<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CRM · Activation du compte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0e7490" />
  <link rel="icon" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <script>
    const saved = localStorage.getItem('crm-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body class="join-page">

  <div class="join-card" id="join-card">
    <!-- Loading state -->
    <div id="join-loading" style="text-align:center;padding:40px 0;">
      <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--primary);"></i>
      <p style="margin-top:12px;color:var(--gray-400);">Vérification de l'invitation…</p>
    </div>

    <!-- Error state -->
    <div id="join-error" class="join-error" style="display:none;">
      <i class="fas fa-exclamation-triangle"></i>
      <h2>Invitation invalide</h2>
      <p id="join-error-msg">Ce lien d'invitation est invalide ou a expiré.</p>
      <a href="index.html" class="btn-primary" style="display:inline-flex;align-items:center;gap:6px;margin-top:16px;text-decoration:none;">
        <i class="fas fa-arrow-left"></i> Retour à la connexion
      </a>
    </div>

    <!-- Form state -->
    <div id="join-main" style="display:none;">
      <div class="join-header">
        <div class="join-logo"><i class="fas fa-user-check"></i></div>
        <h1>Activer votre compte</h1>
        <p>Définissez votre mot de passe pour rejoindre l'équipe</p>
        <span class="join-asso" id="join-asso" style="display:none;"><i class="fas fa-building"></i> <span id="join-asso-name"></span></span>
      </div>

      <form id="join-form">
        <div class="join-form-group">
          <label><i class="fas fa-user" style="margin-right:4px;"></i> Nom d'utilisateur</label>
          <input type="text" id="join-username" class="join-readonly" readonly />
        </div>
        <div class="join-form-group">
          <label><i class="fas fa-envelope" style="margin-right:4px;"></i> Email</label>
          <input type="email" id="join-email" class="join-readonly" readonly />
        </div>
        <div class="join-form-group">
          <label><i class="fas fa-lock" style="margin-right:4px;"></i> Mot de passe</label>
          <input type="password" id="join-password" placeholder="Minimum 6 caractères" required minlength="6" />
          <div class="password-strength">
            <div class="password-strength-fill" id="pw-strength"></div>
          </div>
        </div>
        <div class="join-form-group">
          <label><i class="fas fa-lock" style="margin-right:4px;"></i> Confirmer le mot de passe</label>
          <input type="password" id="join-confirm" placeholder="Répétez le mot de passe" required />
          <small id="pw-match-msg" style="display:none;color:var(--danger);font-size:0.75rem;margin-top:4px;"></small>
        </div>
        <button type="submit" id="join-submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          <i class="fas fa-check"></i> Activer mon compte
        </button>
      </form>
    </div>

    <!-- Success state -->
    <div id="join-success" class="join-success" style="display:none;">
      <i class="fas fa-check-circle"></i>
      <h2>Compte activé !</h2>
      <p>Vous allez être redirigé vers la page de connexion…</p>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="join.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
