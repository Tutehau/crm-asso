<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM · Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script>
    const saved = localStorage.getItem('crm-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>

<!-- Écran de configuration initiale admin -->
<div id="setup-screen" style="display:none;">
  <div class="login-box">
    <h1><i class="fas fa-user-shield"></i> Configuration Initiale</h1>
    <p>Aucun administrateur détecté. Veuillez créer le compte maître.</p>
    <form id="setup-form">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="setup-username" placeholder="Nom d'utilisateur admin" required />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="setup-password" placeholder="Mot de passe" required />
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Créer l'administrateur</button>
      <div id="setup-error" class="message error" style="display:none;"></div>
    </form>
  </div>
</div>

<!-- Écran de connexion -->
<div id="login-screen">
  <div class="login-box">
    <h1><i class="fas fa-handshake"></i> CRM Association</h1>
    <p>Veuillez vous identifier</p>
    <form id="login-form">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="login-username" placeholder="Identifiant" />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="login-password" placeholder="Mot de passe" />
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
      <div id="login-error" class="message error" style="display:none;"></div>
    </form>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
