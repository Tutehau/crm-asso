<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM · Tableau de bord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    const saved = localStorage.getItem('crm-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>
  <main class="main-content">
    <div class="stats-grid">
      <div class="stat-card stat-total"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>Total</h3><p id="stat-total">0</p></div></div>
      <div class="stat-card stat-members"><div class="stat-icon"><i class="fas fa-id-card"></i></div><div class="stat-info"><h3>Membres</h3><p id="stat-members">0</p></div></div>
      <div class="stat-card stat-volunteers"><div class="stat-icon"><i class="fas fa-hand-holding-heart"></i></div><div class="stat-info"><h3>Bénévoles</h3><p id="stat-volunteers">0</p></div></div>
      <div class="stat-card stat-board"><div class="stat-icon"><i class="fas fa-crown"></i></div><div class="stat-info"><h3>Bureau</h3><p id="stat-board">0</p></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box">
        <canvas id="statusChart"></canvas>
      </div>
      <div class="recent-box">
        <h4><i class="fas fa-clock"></i> Derniers contacts</h4>
        <ul id="recent-list"></ul>
      </div>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
